name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            server/frontend/package-lock.json
            server/database/package-lock.json

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt Flask nltk

      - name: Install frontend dependencies
        working-directory: server/frontend
        run: npm ci

      - name: Install API dependencies
        working-directory: server/database
        run: npm ci

      - name: Run Django checks
        working-directory: server
        run: python manage.py check

      - name: Run Django migrations
        working-directory: server
        run: python manage.py migrate

      - name: Run Django tests
        working-directory: server
        run: python manage.py test

      - name: Run frontend tests
        working-directory: server/frontend
        run: CI=true npm test -- --watchAll=false --passWithNoTests

      - name: Build frontend
        working-directory: server/frontend
        run: npm run build
